code: abm
name: "auto-bmad"
description: "Automated BMAD story and sprint pipeline executor"
module_version: 1.0.0
default_selected: false
module_greeting: >
  auto-bmad is ready! Your sprint pipeline is configured for this project.

  Quick start:
    /auto-bmad-sprint-quick N  — quick sprint for epic N (3 steps, ~60-80k tokens, no TEA needed)
    /auto-bmad-sprint N        — full sprint for epic N (11 steps, requires TEA)

  Run /auto-bmad-setup again at any time to reconfigure, or edit _bmad/config.yaml directly.

auto_bmad_artifacts:
  prompt: "Where should auto-bmad store token reports and pipeline artifacts?"
  default: "{implementation_artifacts}/../auto-bmad-artifacts"
  result: "{project-root}/{value}"

tea_enabled:
  prompt: "Is the Test Architect (TEA) module installed in this project?"
  default: "false"
  result: "{value}"
  single-select:
    - value: "true"
      label: "Yes — TEA is installed (enables full 11-step pipeline with ATDD, adversarial review, traceability)"
    - value: "false"
      label: "No — quick mode only (3-step pipeline: create, develop, code review)"

gds_enabled:
  prompt: "Is the Game Dev Studio (GDS/BMGD) module installed in this project?"
  default: "false"
  result: "{value}"
  single-select:
    - value: "true"
      label: "Yes — GDS is installed (enables /auto-gds-* pipeline commands)"
    - value: "false"
      label: "No — standard software project"

default_mode:
  prompt: "Default pipeline mode?"
  default: "quick"
  result: "{value}"
  single-select:
    - value: "quick"
      label: "Quick — 3 steps, ~60-80k tokens, works with Sonnet on any plan"
    - value: "full"
      label: "Full — 11 steps, ~150-250k tokens, requires TEA + higher token plan"
